<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F0F2F5;color:#111827;min-height:100vh;font-size:14px}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#f1f1f1}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
.header{background:linear-gradient(135deg,#1A1A2E 0%,#16213E 50%,#0F3460 100%);padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.header-brand{display:flex;align-items:center;gap:12px}
.header-logo{background:#E8520A;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.95rem;color:#fff;flex-shrink:0}
.header-title{color:#fff;font-size:1rem;font-weight:700;letter-spacing:-.3px}
.header-sub{color:rgba(255,255,255,.5);font-size:.75rem;margin-top:1px}
.header-actions{display:flex;gap:8px;align-items:center}
.upload-bar{background:#fff;border-bottom:1px solid #E5E7EB;padding:10px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.upload-label{font-size:.75rem;color:#6B7280;font-weight:500}
.upload-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:#F3F4F6;border:1.5px dashed #D1D5DB;border-radius:8px;font-size:.75rem;font-weight:600;color:#374151;cursor:pointer;transition:.15s;font-family:inherit}
.upload-btn:hover{background:#EEF2FF;border-color:#6366F1;color:#4F46E5}
.upload-status{font-size:.72rem;color:#10B981;font-weight:500}
.upload-input{display:none}
.filters{background:#fff;padding:12px 28px;border-bottom:1px solid #E5E7EB;display:flex;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:64px;z-index:190}
.filter-group{display:flex;flex-direction:column;gap:3px}
.filter-label{font-size:.68rem;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:.6px}
.filter-select{padding:6px 10px;border:1.5px solid #E5E7EB;border-radius:7px;font-size:.78rem;font-weight:500;color:#374151;background:#fff;cursor:pointer;font-family:inherit;min-width:130px;transition:.15s;outline:none}
.filter-select:focus{border-color:#6366F1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.filter-sep{width:1px;height:32px;background:#E5E7EB;margin:0 4px}
.main{padding:20px 28px;max-width:1600px;margin:0 auto}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.kpi-card{background:#fff;border-radius:12px;padding:18px 20px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #F3F4F6;position:relative;overflow:hidden;transition:.2s}
.kpi-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.09);transform:translateY(-1px)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi-card.blue::before{background:linear-gradient(90deg,#4F81FF,#7C3AED)}
.kpi-card.green::before{background:linear-gradient(90deg,#10B981,#34D399)}
.kpi-card.orange::before{background:linear-gradient(90deg,#F59E0B,#EF4444)}
.kpi-card.purple::before{background:linear-gradient(90deg,#8B5CF6,#EC4899)}
.kpi-label{font-size:.72rem;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kpi-value{font-size:1.55rem;font-weight:800;color:#111827;letter-spacing:-1px;line-height:1}
.kpi-sub{font-size:.72rem;color:#6B7280;margin-top:6px;display:flex;align-items:center;gap:4px}
.kpi-trend-up{color:#10B981;font-weight:600}
.kpi-trend-down{color:#EF4444;font-weight:600}
.chart-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.chart-grid-3{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:18px}
.chart-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #F3F4F6}
.chart-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.chart-title{font-size:.9rem;font-weight:700;color:#111827}
.chart-sub{font-size:.72rem;color:#9CA3AF;margin-top:2px}
.table-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #F3F4F6;margin-bottom:18px}
.table-wrap{overflow-x:auto;margin-top:14px}
table{width:100%;border-collapse:collapse;font-size:.78rem}
thead tr{background:#F8FAFC;border-bottom:2px solid #E5E7EB}
th{padding:10px 12px;text-align:left;font-weight:600;color:#6B7280;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
tbody tr{border-bottom:1px solid #F3F4F6;transition:.1s}
tbody tr:hover{background:#FAFBFF}
td{padding:9px 12px;color:#374151}
.td-mono{font-family:monospace;font-size:.75rem}
.td-status{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:12px;font-size:.68rem;font-weight:600}
.status-fin{background:#D1FAE5;color:#065F46}.status-env{background:#DBEAFE;color:#1E40AF}
.status-can{background:#FEE2E2;color:#991B1B}.status-list{background:#FEF3C7;color:#92400E}
.status-pend{background:#F3F4F6;color:#374151}
.ch-web{background:#EEF2FF;color:#4338CA;padding:3px 9px;border-radius:10px;font-size:.68rem;font-weight:600}
.ch-ml{background:#FFF7ED;color:#C2410C;padding:3px 9px;border-radius:10px;font-size:.68rem;font-weight:600}
.ch-local{background:#F0FDF4;color:#15803D;padding:3px 9px;border-radius:10px;font-size:.68rem;font-weight:600}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;white-space:nowrap}
.btn-orange{background:#E8520A;color:#fff}.btn-orange:hover{background:#CF4709}
.btn-ghost{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2)}.btn-ghost:hover{background:rgba(255,255,255,.2)}
.btn-outline{background:#F3F4F6;color:#374151;border:1px solid #E5E7EB}.btn-outline:hover{background:#E5E7EB}
.btn-sm{padding:6px 12px;font-size:.72rem}
.insight-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
.insight-card{border-radius:12px;padding:18px;color:#fff}
.insight-card.purple{background:linear-gradient(135deg,#667eea,#764ba2)}
.insight-card.green{background:linear-gradient(135deg,#11998e,#38ef7d)}
.insight-card.orange{background:linear-gradient(135deg,#f093fb,#f5576c)}
.insight-title{font-size:.72rem;font-weight:600;opacity:.8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.insight-value{font-size:1.4rem;font-weight:800;letter-spacing:-.5px;line-height:1.2}
.insight-desc{font-size:.72rem;opacity:.75;margin-top:6px}
.pagination{display:flex;align-items:center;gap:6px;justify-content:flex-end;margin-top:12px}
.page-btn{padding:5px 10px;border:1.5px solid #E5E7EB;border-radius:6px;font-size:.72rem;font-weight:600;cursor:pointer;background:#fff;color:#374151;font-family:inherit}
.page-btn:hover{background:#F3F4F6}.page-btn.active{background:#4F46E5;color:#fff;border-color:#4F46E5}
.page-btn:disabled{opacity:.4;cursor:not-allowed}.page-info{font-size:.72rem;color:#6B7280;margin:0 6px}
.legend{display:flex;gap:16px;flex-wrap:wrap}.legend-item{display:flex;align-items:center;gap:6px;font-size:.72rem;font-weight:500;color:#374151}
.legend-dot{width:10px;height:10px;border-radius:50%}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:.95rem;font-weight:700;color:#111827;display:flex;align-items:center;gap:8px}
.section-title span{font-size:.72rem;font-weight:500;color:#6B7280;background:#F3F4F6;padding:2px 8px;border-radius:10px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:160px;color:#9CA3AF;gap:8px;font-size:.82rem}
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.chart-grid-2,.chart-grid-3,.insight-grid{grid-template-columns:1fr}}
</style>
</head>

<script type="text/babel">
const { useState, useMemo, useCallback, useRef } = React;
const { ResponsiveContainer, LineChart, Line, BarChart, Bar, XAxis, YAxis,
  CartesianGrid, Tooltip, Legend, PieChart, Pie, Cell, AreaChart, Area } = Recharts;

const CC={Web:'#4F81FF',MercadoLibre:'#F59E0B',Local:'#10B981'};
const CI={Web:'🌐',MercadoLibre:'🛒',Local:'🏪'};
const PAL=['#4F81FF','#F59E0B','#10B981','#8B5CF6','#EF4444','#06B6D4','#F97316','#84CC16','#EC4899','#6366F1'];
const AS=new Set(['FINALIZADO','ENVIADO','LISTO PARA DESPACHAR','LISTO PARA RETIRAR']);
const SL={FINALIZADO:{l:'Finalizado',c:'status-fin'},ENVIADO:{l:'Enviado',c:'status-env'},
  CANCELADO:{l:'Cancelado',c:'status-can'},'LISTO PARA DESPACHAR':{l:'List.Despacho',c:'status-list'},
  'LISTO PARA RETIRAR':{l:'List.Retiro',c:'status-list'},PENDIENTE:{l:'Pendiente',c:'status-pend'}};

const fmtM=n=>n>=1000000?`$${(n/1e6).toFixed(1)}M`:n>=1000?`$${(n/1e3).toFixed(0)}K`:`$${Math.round(n)}`;
const fmtN=n=>new Intl.NumberFormat('es-AR').format(n);

function gwl(wk){
  const d=new Date(wk+'T00:00:00'),s=new Date(d);s.setDate(d.getDate()+6);
  const p=x=>String(x).padStart(2,'0');
  return `${p(d.getDate())}/${p(d.getMonth()+1)} - ${p(s.getDate())}/${p(s.getMonth()+1)}/${String(s.getFullYear()).slice(2)}`;
}
function gds(ds){const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'],d=new Date(ds+'T00:00:00');return `${days[d.getDay()]} ${String(d.getDate()).padStart(2,'0')}`;}
function gmon(ds){const d=new Date(ds+'T00:00:00'),dy=d.getDay(),df=dy===0?-6:1-dy;d.setDate(d.getDate()+df);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

function parseFile(file,cb){
  const r=new FileReader();
  r.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:'binary',cellDates:true});const ws=wb.Sheets[wb.SheetNames[0]];cb({ok:true,rows:XLSX.utils.sheet_to_json(ws,{header:1,raw:false})});}catch(err){cb({ok:false,error:err.message});}};
  r.readAsBinaryString(file);
}
function normRows(rows){
  const h=rows[0].map(x=>(x||'').toString().trim().toUpperCase());
  const ix=k=>h.findIndex(x=>x.includes(k));
  const iF=ix('FECHA'),iO=ix('ORDEN'),iE=ix('ESTADO'),iM=ix('MONTO'),iFu=ix('FUENTE'),iMp=ix('MARKETPLACE'),iPr=ix('PROVINCIA'),iFp=ix('FORMA'),iPg=ix('METODO PAGO'),iOr=ix('CANAL');
  return rows.slice(1).filter(r=>r[iF]).map(r=>{
    const fu=(r[iFu]||'').toString().trim(),mp=(r[iMp]||'TIENDA ONLINE').toString().trim();
    let c='Web';if(fu.startsWith('MARKETPLACE')||['AONIJIE','NATUREHIKE'].includes(mp))c='MercadoLibre';else if(fu.startsWith('PRESUPUESTO'))c='Local';
    const f=r[iF]?r[iF].toString().substring(0,10):'';const s=f?gmon(f):'';
    return{f,s,sl:s?gwl(s):'',o:parseInt(r[iO])||0,e:(r[iE]||'').trim(),m:parseFloat((r[iM]||'0').toString().replace(/[^0-9.]/g,''))||0,c,mp,or:(r[iOr]||'').trim(),pr:(r[iPr]||'').trim(),fp:(r[iFp]||'').trim(),pg:(r[iPg]||'').trim()};
  });
}

const CT=({active,payload,label})=>{
  if(!active||!payload?.length)return null;
  return(<div style={{background:'#fff',border:'1px solid #E5E7EB',borderRadius:10,padding:'10px 14px',boxShadow:'0 4px 12px rgba(0,0,0,.1)',fontFamily:'Inter,sans-serif'}}>
    <div style={{fontSize:'.72rem',fontWeight:600,color:'#6B7280',marginBottom:6}}>{label}</div>
    {payload.map((p,i)=>(<div key={i} style={{display:'flex',alignItems:'center',gap:8,fontSize:'.78rem',marginBottom:2}}>
      <div style={{width:8,height:8,borderRadius:'50%',background:p.color}}/><span style={{color:'#374151',fontWeight:500}}>{p.name}:</span><span style={{fontWeight:700,color:'#111827'}}>{fmtM(p.value)}</span>
    </div>))}
  </div>);
};

const KPI=({label,value,sub,trend,color})=>(
  <div className={`kpi-card ${color}`}>
    <div className="kpi-label">{label}</div>
    <div className="kpi-value">{value}</div>
    <div className="kpi-sub">
      {trend!=null&&<span className={trend>=0?'kpi-trend-up':'kpi-trend-down'}>{trend>=0?'▲':'▼'} {Math.abs(trend).toFixed(1)}%</span>}
      {sub&&<span>{sub}</span>}
    </div>
  </div>
);

const ChTag=({c})=><span className={c==='Web'?'ch-web':c==='MercadoLibre'?'ch-ml':'ch-local'}>{CI[c]} {c}</span>;

function App(){
  const [ao,setAo]=useState(window.NAKA_DATA.orders);
  const [ai,setAi]=useState(window.NAKA_DATA.items);
  const [us,setUs]=useState('');
  const [fl,setFl]=useState({semana:'all',canal:'all',marca:'all',provincia:'all',estado:'activo'});
  const [tp,setTp]=useState(1);
  const [ts,setTs]=useState('');
  const [tab,setTab]=useState('overview');
  const PS=20;const mr=useRef(null);const fr=useRef();

  const weeks=useMemo(()=>['all',...Array.from(new Set(ao.filter(o=>o.s).map(o=>o.s))).sort()],[ao]);
  const marcas=useMemo(()=>['all',...Array.from(new Set(ai.filter(i=>i.br).map(i=>i.br))).sort()],[ai]);
  const provs=useMemo(()=>['all',...Array.from(new Set(ao.filter(o=>o.pr).map(o=>o.pr))).sort()],[ao]);

  const fo=useMemo(()=>ao.filter(o=>{
    if(fl.estado==='activo'&&!AS.has(o.e))return false;
    if(fl.semana!=='all'&&o.s!==fl.semana)return false;
    if(fl.canal!=='all'&&o.c!==fl.canal)return false;
    if(fl.provincia!=='all'&&o.pr!==fl.provincia)return false;
    return true;
  }),[ao,fl]);

  const fi=useMemo(()=>{const os=new Set(fo.map(o=>o.o));return ai.filter(it=>{if(!os.has(it.o))return false;if(fl.marca!=='all'&&it.br!==fl.marca)return false;return true;});},[ai,fo,fl]);

  const kpis=useMemo(()=>{
    const rev=fo.reduce((s,o)=>s+o.m,0),cnt=fo.length,aov=cnt?rev/cnt:0;
    const bc={};for(const o of fo){if(!bc[o.c])bc[o.c]={rev:0,cnt:0};bc[o.c].rev+=o.m;bc[o.c].cnt++;}
    const aw=weeks.filter(w=>w!=='all').sort();let trend=null;
    if(fl.semana!=='all'){const idx=aw.indexOf(fl.semana);if(idx>0){const pw=aw[idx-1];const pr=ao.filter(o=>o.s===pw&&AS.has(o.e)).reduce((s,o)=>s+o.m,0);if(pr>0)trend=((rev-pr)/pr)*100;}}
    const best=Object.entries(bc).sort((a,b)=>b[1].rev-a[1].rev)[0];
    return{rev,cnt,aov,bc,trend,best};
  },[fo,fl,ao,weeks]);

  const dd=useMemo(()=>{const m={};for(const o of fo){if(!o.f)continue;if(!m[o.f])m[o.f]={date:o.f,day:gds(o.f),Web:0,MercadoLibre:0,Local:0};m[o.f][o.c]+=o.m;}return Object.values(m).sort((a,b)=>a.date.localeCompare(b.date));},[fo]);

  const wd=useMemo(()=>{const m={};for(const o of ao){if(!o.s||!AS.has(o.e))continue;if(!m[o.s])m[o.s]={week:gwl(o.s),wk:o.s,Web:0,MercadoLibre:0,Local:0,orders:0};m[o.s][o.c]+=o.m;m[o.s].orders++;}return Object.values(m).sort((a,b)=>a.wk.localeCompare(b.wk));},[ao]);

  const cpd=useMemo(()=>Object.entries(kpis.bc||{}).map(([n,d])=>({name:n,value:d.rev,count:d.cnt,color:CC[n]||'#94A3B8'})).sort((a,b)=>b.value-a.value),[kpis]);

  const bd=useMemo(()=>{const m={};for(const it of fi){if(!m[it.br])m[it.br]={brand:it.br,revenue:0,qty:0};m[it.br].revenue+=it.t;m[it.br].qty+=it.q;}return Object.values(m).sort((a,b)=>b.revenue-a.revenue).slice(0,10).map((b,i)=>({...b,color:PAL[i%PAL.length]}));},[fi]);

  const pd=useMemo(()=>{const m={};for(const o of fo){if(!o.pr)continue;if(!m[o.pr])m[o.pr]={prov:o.pr,revenue:0,orders:0};m[o.pr].revenue+=o.m;m[o.pr].orders++;}return Object.values(m).sort((a,b)=>b.revenue-a.revenue).slice(0,10);},[fo]);

  const pyd=useMemo(()=>{const m={};for(const o of fo){const k=o.pg||o.fp||'Otro';if(!m[k])m[k]={method:k,count:0,revenue:0};m[k].count++;m[k].revenue+=o.m;}return Object.values(m).sort((a,b)=>b.revenue-a.revenue).map((p,i)=>({...p,color:PAL[i%PAL.length]}));},[fo]);

  const ord=useMemo(()=>{const m={};for(const o of fo){const k=o.or||'Desconocido';if(!m[k])m[k]={origen:k,revenue:0,orders:0};m[k].revenue+=o.m;m[k].orders++;}return Object.values(m).sort((a,b)=>b.revenue-a.revenue).slice(0,8);},[fo]);

  const ins=useMemo(()=>{
    const tr=fo.reduce((s,o)=>s+o.m,0),wr=fo.filter(o=>o.c==='Web').reduce((s,o)=>s+o.m,0);
    const can=ao.filter(o=>o.e==='CANCELADO'&&(fl.semana==='all'||o.s===fl.semana));
    const tot=ao.filter(o=>(fl.semana==='all'||o.s===fl.semana));
    return{wp:tr?((wr/tr)*100).toFixed(1):0,tb:bd[0],tp2:pd[0],cr:tot.length?((can.length/tot.length)*100).toFixed(1):0,aov:fo.length?tr/fo.length:0};
  },[fo,bd,pd,ao,fl]);

  const to=useMemo(()=>{let d=[...fo];if(ts){const q=ts.toLowerCase();d=d.filter(o=>String(o.o).includes(q)||(o.pr||'').toLowerCase().includes(q)||(o.c||'').toLowerCase().includes(q));}return d.sort((a,b)=>(b.f||'').localeCompare(a.f||''));},[fo,ts]);
  const tPages=Math.max(1,Math.ceil(to.length/PS));
  const pOrds=to.slice((tp-1)*PS,tp*PS);

  const hUp=useCallback(e=>{const file=e.target.files[0];if(!file)return;setUs('Procesando...');parseFile(file,res=>{if(!res.ok){setUs('Error: '+res.error);return;}try{const n=normRows(res.rows);if(n.length>0){setAo(n);setAi([]);setUs(`✓ ${n.length} pedidos de ${file.name}`);setFl({semana:'all',canal:'all',marca:'all',provincia:'all',estado:'activo'});}else{setUs('Sin datos válidos.');}}catch(err){setUs('Error: '+err.message);}});e.target.value='';},[]);

  const xCSV=()=>{const h=['Fecha','Orden','Estado','Canal','Monto','Provincia','Forma Pago','Método','Origen'];const rows=fo.map(o=>[o.f,o.o,o.e,o.c,o.m,o.pr,o.fp,o.pg,o.or]);const csv=[h,...rows].map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');const b=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`naka-ventas-${new Date().toISOString().slice(0,10)}.csv`;a.click();};

  const xPDF=async()=>{try{const{jsPDF}=window.jspdf;const el=mr.current;const cv=await html2canvas(el,{scale:1.5,useCORS:true,backgroundColor:'#F0F2F5'});const img=cv.toDataURL('image/jpeg',.85);const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});const w=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();const h=(cv.height/cv.width)*w;pdf.addImage(img,'JPEG',0,0,w,h);if(h>ph){let y=-ph;while(-y<h){pdf.addPage();pdf.addImage(img,'JPEG',0,y,w,h);y-=ph;}}pdf.save(`naka-dashboard-${new Date().toISOString().slice(0,10)}.pdf`);}catch(e){alert('Error PDF: '+e.message);}};

  const xHTML=()=>{const styles=Array.from(document.styleSheets).map(s=>{try{return Array.from(s.cssRules).map(r=>r.cssText).join('\n');}catch(e){return'';}}).join('\n');const content=mr.current.innerHTML;const date=new Date().toLocaleDateString('es-AR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});const html=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Naka Reporte ${date}</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><style>${styles}</style></head><body style="background:#F0F2F5;font-family:Inter,sans-serif"><div style="background:linear-gradient(135deg,#1A1A2E,#0F3460);padding:16px 28px;display:flex;align-items:center;gap:12px"><div style="background:#E8520A;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff">N</div><div><div style="color:#fff;font-size:1rem;font-weight:700">NAKA OUTDOORS | Reporte Semanal</div><div style="color:rgba(255,255,255,.5);font-size:.72rem">Exportado el ${date}</div></div></div><div style="padding:20px 28px">${content}</div></body></html>`;const b=new Blob([html],{type:'text/html;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`naka-reporte-${new Date().toISOString().slice(0,10)}.html`;a.click();};

  const sf=(k,v)=>{setFl(f=>({...f,[k]:v}));setTp(1);};

  const TABS=[{id:'overview',l:'📊 Resumen CEO'},{id:'canales',l:'📡 Por Canal'},{id:'productos',l:'🏷️ Marcas'},{id:'geografia',l:'📍 Geografía'},{id:'pedidos',l:'📋 Pedidos'}];

  return(<div>
    <div className="header">
      <div className="header-brand">
        <div className="header-logo">N</div>
        <div><div className="header-title">NAKA OUTDOORS</div><div className="header-sub">Dashboard Semanal · CEO View</div></div>
      </div>
      <div className="header-actions">
        <button className="btn btn-ghost" onClick={xCSV}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>CSV
        </button>
        <button className="btn btn-ghost" onClick={xPDF}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>PDF
        </button>
        <button className="btn btn-orange" onClick={xHTML}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>Exportar HTML
        </button>
      </div>
    </div>

    <div className="upload-bar">
      <span className="upload-label">📂 Cargar datos:</span>
      <label className="upload-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        Subir XLSX / CSV
        <input ref={fr} type="file" accept=".xlsx,.csv,.xls" className="upload-input" onChange={hUp}/>
      </label>
      <span style={{fontSize:'.72rem',color:'#9CA3AF'}}>Soporta XLSX · CSV · XLS — columnas: FECHA, ORDEN, ESTADO, MONTO, FUENTE, MARKETPLACE, PROVINCIA</span>
      {us&&<span className="upload-status">{us}</span>}
      <span style={{marginLeft:'auto',fontSize:'.72rem',color:'#9CA3AF'}}>{ao.length} pedidos · {ai.length} productos</span>
    </div>

    <div className="filters">
      <div className="filter-group">
        <div className="filter-label">Semana</div>
        <select className="filter-select" value={fl.semana} onChange={e=>sf('semana',e.target.value)}>
          <option value="all">Todas las semanas</option>
          {weeks.filter(w=>w!=='all').map(w=><option key={w} value={w}>{gwl(w)}</option>)}
        </select>
      </div>
      <div className="filter-sep"/>
      <div className="filter-group">
        <div className="filter-label">Canal</div>
        <select className="filter-select" value={fl.canal} onChange={e=>sf('canal',e.target.value)}>
          <option value="all">Todos</option>
          {['Web','MercadoLibre','Local'].map(c=><option key={c} value={c}>{CI[c]} {c}</option>)}
        </select>
      </div>
      <div className="filter-sep"/>
      <div className="filter-group">
        <div className="filter-label">Marca</div>
        <select className="filter-select" value={fl.marca} onChange={e=>sf('marca',e.target.value)}>
          <option value="all">Todas</option>
          {marcas.filter(m=>m!=='all').map(m=><option key={m} value={m}>{m}</option>)}
        </select>
      </div>
      <div className="filter-sep"/>
      <div className="filter-group">
        <div className="filter-label">Provincia</div>
        <select className="filter-select" value={fl.provincia} onChange={e=>sf('provincia',e.target.value)}>
          <option value="all">Todas</option>
          {provs.filter(p=>p!=='all').map(p=><option key={p} value={p}>{p}</option>)}
        </select>
      </div>
      <div className="filter-sep"/>
      <div className="filter-group">
        <div className="filter-label">Estado</div>
        <select className="filter-select" value={fl.estado} onChange={e=>sf('estado',e.target.value)}>
          <option value="activo">Solo activos</option>
          <option value="all">Todos</option>
        </select>
      </div>
      <div style={{marginLeft:'auto'}}>
        <button onClick={()=>setFl({semana:'all',canal:'all',marca:'all',provincia:'all',estado:'activo'})}
          style={{padding:'6px 14px',background:'#F3F4F6',border:'1px solid #E5E7EB',borderRadius:8,fontSize:'.72rem',fontWeight:600,color:'#374151',cursor:'pointer',fontFamily:'Inter,sans-serif'}}>
          ✕ Limpiar filtros
        </button>
      </div>
    </div>

    <div className="main" ref={mr}>
      <div style={{display:'flex',gap:0,marginBottom:18,borderBottom:'2px solid #E5E7EB'}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            padding:'10px 18px',background:'none',border:'none',cursor:'pointer',fontFamily:'Inter,sans-serif',
            fontSize:'.78rem',fontWeight:600,color:tab===t.id?'#4F46E5':'#6B7280',
            borderBottom:tab===t.id?'2px solid #4F46E5':'2px solid transparent',marginBottom:-2,whiteSpace:'nowrap'
          }}>{t.l}</button>
        ))}
      </div>

      {tab==='overview'&&<TabOverview fo={fo} fi={fi} kpis={kpis} dd={dd} wd={wd} cpd={cpd} bd={bd} pd={pd} pyd={pyd} ins={ins}/>}
      {tab==='canales'&&<TabCanales fo={fo} ord={ord}/>}
      {tab==='productos'&&<TabProductos fi={fi} bd={bd}/>}
      {tab==='geografia'&&<TabGeo pd={pd}/>}
      {tab==='pedidos'&&<TabPedidos to={to} pOrds={pOrds} tp={tp} setTp={setTp} tPages={tPages} ts={ts} setTs={setTs} PS={PS} xCSV={xCSV}/>}

      <div style={{textAlign:'center',padding:'20px 0 8px',fontSize:'.72rem',color:'#9CA3AF',borderTop:'1px solid #E5E7EB',marginTop:8}}>
        Naka Outdoors · Dashboard Semanal · {new Date().toLocaleDateString('es-AR',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
      </div>
    </div>
  </div>);
}

      </div>

          <div style={{fontSize:'1.4rem',fontWeight:800,color:'#111827',letterSpacing:'-1px',lineHeight:1}}>{fmtM(d.rev)}</div>
          <div style={{fontSize:'.72rem',color:'#6B7280',marginTop:4}}>{d.cnt} pedidos · {pct}% del total</div>
          <div style={{marginTop:10,height:5,background:'#F3F4F6',borderRadius:3}}>

    <div className="chart-grid-3">
      <div className="chart-card">
        <div className="chart-header">
          <div><div className="chart-title">Ventas Diarias por Canal</div><div className="chart-sub">Revenue por día</div></div>
          <div className="legend">{['Web','MercadoLibre','Local'].map(c=><div key={c} className="legend-item"><div className="legend-dot" style={{background:CC[c]}}/>{c}</div>)}</div>

function TabCanales({fo,ord}){
  return(<div>
    <div className="chart-grid-2">
      {['Web','MercadoLibre','Local'].map(ch=>{
        const chO=fo.filter(o=>o.c===ch),rev=chO.reduce((s,o)=>s+o.m,0);
        const dMap={};for(const o of chO){if(!o.f)continue;if(!dMap[o.f])dMap[o.f]={day:gds(o.f),revenue:0};dMap[o.f].revenue+=o.m;}
        const dArr=Object.values(dMap).sort((a,b)=>a.day.localeCompare(b.day));
        const oMap={};for(const o of chO){const k=o.or||'Desconocido';if(!oMap[k])oMap[k]=0;oMap[k]+=o.m;}
        const oTop=Object.entries(oMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
        return(<div key={ch} className="chart-card">
          <div style={{borderLeft:`4px solid ${CC[ch]}`,paddingLeft:12,marginBottom:14}}>
            <div style={{fontSize:'.95rem',fontWeight:700}}>{CI[ch]} {ch}</div>
            <div style={{fontSize:'.72rem',color:'#6B7280',marginTop:2}}>{fmtM(rev)} · {chO.length} pedidos · ticket {fmtM(chO.length?rev/chO.length:0)}</div>
          </div>
          {dArr.length>0
            ?<ResponsiveContainer width="100%" height={140}>
              <BarChart data={dArr} margin={{top:2,right:2,left:0,bottom:2}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F8FAFC" vertical={false}/>
                <XAxis dataKey="day" tick={{fontSize:10,fill:'#9CA3AF'}} axisLine={false} tickLine={false}/>
                <YAxis tickFormatter={v=>fmtM(v)} tick={{fontSize:10,fill:'#9CA3AF'}} axisLine={false} tickLine={false} width={48}/>
                <Tooltip formatter={v=>fmtM(v)}/>
                <Bar dataKey="revenue" fill={CC[ch]} radius={[4,4,0,0]} name="Revenue"/>
              </BarChart>
            </ResponsiveContainer>
            :<div className="empty" style={{height:100}}>Sin datos</div>}
          <div style={{marginTop:12}}>
            <div style={{fontSize:'.68rem',fontWeight:600,color:'#9CA3AF',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:6}}>Top Orígenes</div>
            {oTop.map(([k,v])=><div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:'.72rem',padding:'3px 0',borderBottom:'1px solid #F8FAFC'}}>
              <span style={{color:'#374151'}}>{k}</span><span style={{fontWeight:600}}>{fmtM(v)}</span>
            </div>)}

        </div>);
      })}
      <div className="chart-card">
        <div className="chart-header"><div><div className="chart-title">Canales de Adquisición</div><div className="chart-sub">Revenue por origen</div></div></div>
        <ResponsiveContainer width="100%" height={240}>

            <CartesianGrid strokeDasharray="3 3" stroke="#F3F4F6" horizontal={false}/>
            <XAxis type="number" tickFormatter={v=>fmtM(v)} tick={{fontSize:10,fill:'#9CA3AF'}} axisLine={false} tickLine={false}/>
            <YAxis dataKey="origen" type="category" tick={{fontSize:10,fill:'#374151'}} axisLine={false} tickLine={false} width={85}/>
            <Tooltip formatter={v=>fmtM(v)}/>
            <Bar dataKey="revenue" fill="#4F81FF" radius={[0,4,4,0]} name="Revenue"/>
          </BarChart>
        </ResponsiveContainer>

    </div>
  </div>);

              {bd.map((e,i)=><Cell key={i} fill={e.color}/>)}</Pie><Tooltip formatter={v=>fmtM(v)}/></PieChart>
          </ResponsiveContainer>
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            {bd.slice(0,6).map(b=>{const tot=bd.reduce((s,x)=>s+x.revenue,0);return(
              <div key={b.brand} style={{display:'flex',alignItems:'center',gap:8,fontSize:'.72rem'}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:b.color,flexShrink:0}}/><span style={{flex:1}}>{b.brand}</span>
                <span style={{fontWeight:600}}>{fmtM(b.revenue)}</span><span style={{color:'#9CA3AF',width:34,textAlign:'right'}}>{tot?((b.revenue/tot)*100).toFixed(1):0}%</span>
              </div>);})}
          </div>
        </div>}
      </div>
    </div>
    <div className="table-card">
      <div className="section-header"><div className="section-title">Top Productos <span>{fi.length} líneas</span></div></div>
      <div className="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Producto</th><th>Marca</th><th>Canal</th><th>Uds</th><th>Revenue</th></tr></thead>
          <tbody>{prods.map((p,i)=><tr key={i}>
            <td style={{color:'#9CA3AF',fontWeight:600}}>{i+1}</td>
            <td style={{maxWidth:260,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}} title={p.desc}>{p.desc}</td>
            <td><span style={{background:'#F3F4F6',color:'#374151',padding:'2px 8px',borderRadius:6,fontSize:'.68rem',fontWeight:600}}>{p.brand}</span></td>
            <td><ChTag c={p.canal}/></td>
            <td style={{fontWeight:600}}>{fmtN(p.qty)}</td>
            <td style={{fontWeight:700,color:'#111827'}}>{fmtM(p.revenue)}</td>
          </tr>)}</tbody>
        </table>
      </div>
    </div>
  </div>);
}

function TabGeo({pd}){
  return(<div>
    <div className="chart-grid-2">
      <div className="chart-card">
        <div className="chart-header"><div><div className="chart-title">Top Provincias por Revenue</div><div className="chart-sub">Destino de envío</div></div></div>
        {pd.length===0?<div className="empty">Sin datos</div>
          :<ResponsiveContainer width="100%" height={320}>
            <BarChart data={pd} layout="vertical" margin={{top:4,right:60,left:110,bottom:4}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#F3F4F6" horizontal={false}/>
              <XAxis type="number" tickFormatter={v=>fmtM(v)} tick={{fontSize:10,fill:'#9CA3AF'}} axisLine={false} tickLine={false}/>
              <YAxis dataKey="prov" type="category" tick={{fontSize:10,fill:'#374151'}} axisLine={false} tickLine={false} width={115}/>
              <Tooltip formatter={v=>fmtM(v)}/>
              <Bar dataKey="revenue" fill="#6366F1" radius={[0,4,4,0]} name="Revenue"/>
            </BarChart>
          </ResponsiveContainer>}
      </div>
      <div className="chart-card">
        <div className="chart-header"><div><div className="chart-title">Ranking de Provincias</div></div></div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>#</th><th>Provincia</th><th>Pedidos</th><th>Revenue</th><th>Ticket</th></tr></thead>
            <tbody>{pd.map((p,i)=><tr key={p.prov}>
              <td style={{color:'#9CA3AF',fontWeight:700}}>{i+1}</td>
              <td style={{fontWeight:500}}>{p.prov}</td>
              <td>{fmtN(p.orders)}</td>
              <td style={{fontWeight:700,color:'#111827'}}>{fmtM(p.revenue)}</td>
              <td style={{color:'#6B7280'}}>{fmtM(p.orders?p.revenue/p.orders:0)}</td>
            </tr>)}</tbody>
          </table>
        </div>
      </div>
    </div>
  </div>);
}

function TabPedidos({to,pOrds,tp,setTp,tPages,ts,setTs,PS,xCSV}){
  const SL2={FINALIZADO:{l:'Finalizado',c:'status-fin'},ENVIADO:{l:'Enviado',c:'status-env'},CANCELADO:{l:'Cancelado',c:'status-can'},'LISTO PARA DESPACHAR':{l:'List.Despacho',c:'status-list'},'LISTO PARA RETIRAR':{l:'List.Retiro',c:'status-list'},PENDIENTE:{l:'Pendiente',c:'status-pend'}};
  return(<div className="table-card">
    <div className="section-header">
      <div className="section-title">Listado de Pedidos <span>{fmtN(to.length)} resultados</span></div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <input type="text" placeholder="Buscar orden, provincia..." value={ts}
          onChange={e=>{setTs(e.target.value);setTp(1);}}
          style={{padding:'7px 12px',border:'1.5px solid #E5E7EB',borderRadius:8,fontSize:'.78rem',fontFamily:'Inter,sans-serif',outline:'none',width:210}}/>
        <button onClick={xCSV} style={{padding:'6px 12px',background:'#F3F4F6',border:'1px solid #E5E7EB',borderRadius:8,fontSize:'.72rem',fontWeight:600,color:'#374151',cursor:'pointer',fontFamily:'Inter,sans-serif'}}>↓ CSV</button>
      </div>
    </div>
    <div className="table-wrap">
      <table>
        <thead><tr><th>Fecha</th><th>Orden</th><th>Estado</th><th>Canal</th><th>Monto</th><th>Provincia</th><th>Pago</th><th>Origen</th></tr></thead>
        <tbody>{pOrds.map((o,i)=>{const st=SL2[o.e]||{l:o.e,c:'status-pend'};return(
          <tr key={`${o.o}-${i}`}>
            <td className="td-mono">{o.f}</td>
            <td className="td-mono" style={{fontWeight:600,color:'#4F46E5'}}>#{o.o}</td>
            <td><span className={`td-status ${st.c}`}>{st.l}</span></td>
            <td><ChTag c={o.c}/></td>
            <td style={{fontWeight:700}}>{fmtM(o.m)}</td>
            <td>{o.pr}</td>
            <td style={{color:'#6B7280'}}>{o.pg||o.fp||'–'}</td>
            <td style={{color:'#9CA3AF',fontSize:'.72rem',maxWidth:120,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{o.or||'–'}</td>
          </tr>);})}
        </tbody>
      </table>
    </div>
    <div className="pagination">
      <span className="page-info">{fmtN((tp-1)*PS+1)}–{fmtN(Math.min(tp*PS,to.length))} de {fmtN(to.length)}</span>
      <button className="page-btn" disabled={tp===1} onClick={()=>setTp(1)}>«</button>
      <button className="page-btn" disabled={tp===1} onClick={()=>setTp(p=>p-1)}>‹</button>
      {Array.from({length:Math.min(5,tPages)},(_,i)=>{const s=Math.max(1,tp-2),p=s+i;if(p>tPages)return null;return<button key={p} className={`page-btn${p===tp?' active':''}`} onClick={()=>setTp(p)}>{p}</button>;})}
      <button className="page-btn" disabled={tp===tPages} onClick={()=>setTp(p=>p+1)}>›</button>
      <button className="page-btn" disabled={tp===tPages} onClick={()=>setTp(tPages)}>»</button>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
